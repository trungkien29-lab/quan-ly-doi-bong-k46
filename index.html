<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLB Bóng Đá</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:url('team.jpg') center/cover fixed no-repeat;color:white}
.overlay{background:rgba(0,0,0,0.65);min-height:100vh;padding:20px}

header{
display:flex;justify-content:space-between;align-items:center;
padding:15px 30px;background:linear-gradient(90deg,#b30000,#ff0000);
border-radius:15px;margin-bottom:20px}

nav button{margin-left:10px;padding:8px 14px;border:none;border-radius:8px;background:white;color:#b30000;font-weight:bold}

.section{display:none}
.active{display:block}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(8px);
padding:20px;border-radius:20px;margin-bottom:20px}

input,button{padding:8px;border-radius:6px;border:none;margin:3px}
button{background:red;color:white;font-weight:bold;cursor:pointer}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px;background:rgba(0,0,0,0.4);text-align:center}
th{background:red}

.player-img{width:45px;height:45px;border-radius:50%;object-fit:cover}
</style>
</head>

<body>
<div class="overlay">

<header>
<h1 id="teamName">CLB Bóng Đá</h1>
<nav>
<button onclick="show('players')">Đội hình</button>
<button onclick="show('admin')">Quản lí</button>
</nav>
</header>

<!-- DANH SÁCH -->
<div id="players" class="section active card">
<h2>Danh sách cầu thủ</h2>
<input id="search" placeholder="Tìm cầu thủ" oninput="renderPlayers()">
<button onclick="sortPlayers()">Sắp xếp số áo</button>

<table>
<thead>
<tr>
<th>Ảnh</th><th>Tên</th><th>Số áo</th><th>Bàn</th>
<th>Kiến tạo</th><th>Quê</th><th>Vị trí</th><th>Chỉnh</th>
</tr>
</thead>
<tbody id="playerTable"></tbody>
</table>
</div>

<!-- ADMIN -->
<div id="admin" class="section card">

<h3>Sửa tên đội</h3>
<input id="teamInput" placeholder="Tên đội">
<button onclick="saveTeam()">Lưu</button>

<h3>Thêm cầu thủ</h3>
<input id="name" placeholder="Tên">
<input id="number" placeholder="Số áo">
<input id="goal" placeholder="Bàn">
<input id="assist" placeholder="Kiến tạo">
<input id="home" placeholder="Quê">
<input id="pos" placeholder="Vị trí">
<input id="img" placeholder="Ảnh jpg ví dụ player1.jpg">
<button onclick="addPlayer()">Thêm</button>

</div>

</div>

<script>

let players = JSON.parse(localStorage.players || "[]");
let team = localStorage.team || "CLB Bóng Đá";
document.getElementById("teamName").innerText = team;

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function saveTeam(){
let t = document.getElementById("teamInput").value;
if(!t) return;
localStorage.team = t;
document.getElementById("teamName").innerText = t;
}

function addPlayer(){
let p={
name:document.getElementById("name").value,
number:Number(document.getElementById("number").value),
goal:Number(document.getElementById("goal").value),
assist:Number(document.getElementById("assist").value),
home:document.getElementById("home").value,
pos:document.getElementById("pos").value,
img:document.getElementById("img").value
};

if(!p.name){alert("Nhập tên cầu thủ");return;}

players.push(p);
save();
renderPlayers();
}

function renderPlayers(){
let s=document.getElementById("search").value?.toLowerCase()||"";

document.getElementById("playerTable").innerHTML =
players.filter(p=>p.name.toLowerCase().includes(s))
.map((p,i)=>`
<tr>
<td><img class="player-img" src="${p.img||'player1.jpg'}"></td>
<td>${p.name}</td>
<td>${p.number}</td>
<td>${p.goal}</td>
<td>${p.assist}</td>
<td>${p.home}</td>
<td>${p.pos}</td>
<td>
<button onclick="edit(${i})">Sửa</button>
<button onclick="del(${i})">Xóa</button>
</td>
</tr>`).join("");
}

function edit(i){
let p=players[i];
name.value=p.name;
number.value=p.number;
goal.value=p.goal;
assist.value=p.assist;
home.value=p.home;
pos.value=p.pos;
img.value=p.img;
players.splice(i,1);
save();
renderPlayers();
}

function del(i){
players.splice(i,1);
save();
renderPlayers();
}

function sortPlayers(){
players.sort((a,b)=>a.number-b.number);
save();
renderPlayers();
}

function save(){
localStorage.players = JSON.stringify(players);
}

renderPlayers();

</script>
</body>
</html>
